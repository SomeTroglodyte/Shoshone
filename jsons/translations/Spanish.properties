
#################### Lines from Nations ####################

Pocatello = Pocatello
Shoshone warriors, we will kill the white man! = ¡Guerreros shoshone, mataremos al hombre blanco!
I must make the foreigner go away! = ¡Debo hacer que los extranjeros se vayan!
This will not be the end of my people, I assure you. = Esto no será el fin de mi pueblo, te lo aseguro.
I am Chief Pocatello. You have arrived in the thick of Shoshone land. = Soy el jefe Pocatello. Has llegado al corazón del territorio Shoshone.
Would you listen to my proposal? = ¿Escucharías mi propuesta?
Our messenger has arrived! = ¡Nuestro mensajero ha llegado!
Be alert, foreigner! = ¡Esté alerta, extranjero!
Great Expanse = Las Extensas Llanuras
Blessings be upon you, wise and fearsome Chief Pocatello, revered leader of the Shoshone people. As the young chieftain of the Shoshone, you rose to face a wave of encroaching American settlements across the western United States. Forced to defend the Shoshone ancestral lands from a seemingly endless stream of new emigrants, your war band struck fear into those who would claim the sacred lands of your people. After years of strife, you skillfully avoided a direct conflict with the armies of the U.S. government, and negotiated a series of treaties in the hopes of establishing a lasting peace for the Shoshone. = Que la bendición recaiga sobre ti, sabio y temible jefe Pocatello, venerado líder del pueblo Shoshone. Como joven jefe Shoshone, te alzaste para enfrentar una oleada de asentamientos de imigrantes que avanzaban por el oeste de los Estados Unidos. Obligado a defender las tierras ancestrales Shoshone de un flujo aparentemente interminable de nuevos imigrantes, tu grupo de guerreros infundió temor en aquellos que pretendían reclamar las tierras sagradas de tu pueblo. Tras años de lucha, evitaste hábilmente un conflicto directo con los ejércitos del gobierno estadounidense y negociaste una serie de tratados con la esperanza de establecer una paz duradera para los Shoshone.
Most esteemed Pocatello, your people once again look to you for guidance. Will you conquer your enemies, driving them far from your lands? Or will you seek out peaceful diplomacy and trade? Will your new empire shine through the ages of history? = Estimado Pocatello, tu pueblo vuelve a acudir a ti en busca de guía. ¿Conquistarás a tus enemigos, expulsándolos lejos de tus tierras? ¿O buscarás la paz, la diplomacia y el comercio? ¿Brillará tu nuevo imperio a través de los siglos de la historia?
