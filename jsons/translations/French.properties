
#################### Lines from Nations ####################

Pocatello = Pocatello
Shoshone warriors, we will kill the white man! = Guerriers Shoshones, nous tuerons l'homme blanc !
I must make the foreigner go away! = Je dois faire partir les étrangers !
This will not be the end of my people, I assure you. = Ce ne sera pas la fin de mon peuple, je vous l'assure.
I am Chief Pocatello. You have arrived in the thick of Shoshone land. = Je suis le chef Pocatello. Vous êtes arrivés au cœur du territoire Shoshone.
Would you listen to my proposal? = Accepteriez-vous d'écouter ma proposition ?
Our messenger has arrived! = Notre messager est arrivé !
Be alert, foreigner! = Sois vigilant, étranger !
Great Expanse = La Grande Étendue
Blessings be upon you, wise and fearsome Chief Pocatello, revered leader of the Shoshone people. As the young chieftain of the Shoshone, you rose to face a wave of encroaching American settlements across the western United States. Forced to defend the Shoshone ancestral lands from a seemingly endless stream of new emigrants, your war band struck fear into those who would claim the sacred lands of your people. After years of strife, you skillfully avoided a direct conflict with the armies of the U.S. government, and negotiated a series of treaties in the hopes of establishing a lasting peace for the Shoshone. = Que la bénédiction soit sur vous, sage et redoutable chef Pocatello, vénéré chef du peuple Shoshone. Jeune chef Shoshone, vous avez dû affronter l'avancée des colonies américaines à travers l'ouest des États-Unis. Contraint de défendre les terres ancestrales Shoshone contre un flot incessant de nouveaux émigrants, votre armée sema la terreur chez ceux qui convoitaient les terres sacrées de votre peuple. Après des années de lutte, vous avez habilement évité un conflit direct avec les armées du gouvernement américain et négocié une série de traités dans l'espoir d'instaurer une paix durable pour les Shoshones.
Most esteemed Pocatello, your people once again look to you for guidance. Will you conquer your enemies, driving them far from your lands? Or will you seek out peaceful diplomacy and trade? Will your new empire shine through the ages of history? = Très estimé Pocatello, votre peuple se tourne une fois de plus vers vous pour le guider. Parviendrez-vous à vaincre vos ennemis et à les chasser loin de vos terres ? Ou privilégierez-vous la diplomatie et le commerce pacifiques ? Votre nouvel empire brillera-t-il à travers les âges ?
