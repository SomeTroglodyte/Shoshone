
#################### Lines from Nations ####################

Pocatello = Pocatello
Shoshone warriors, we will kill the white man! = Shoshonen, laßt uns den weißen Mann ausrotten!
I must make the foreigner go away! = Ich muss alle Fremden vertreiben!
This will not be the end of my people, I assure you. = Das wird nicht das Ende meines Volkes sein, da kannst Du Gift drauf nehmen.
I am Chief Pocatello. You have arrived in the thick of Shoshone land. = Ich bin Häuptling Pocatello. Ihr seid mitten im Shoshone-Land angekommen.
Would you listen to my proposal? = Würdest du dir meinen Vorschlag anhören?
Our messenger has arrived! = Unser Bote ist angekommen!
Be alert, foreigner! = Sei wachsam, Fremder!
Great Expanse = Die Große Weite
Blessings be upon you, wise and fearsome Chief Pocatello, revered leader of the Shoshone people. As the young chieftain of the Shoshone, you rose to face a wave of encroaching American settlements across the western United States. Forced to defend the Shoshone ancestral lands from a seemingly endless stream of new emigrants, your war band struck fear into those who would claim the sacred lands of your people. After years of strife, you skillfully avoided a direct conflict with the armies of the U.S. government, and negotiated a series of treaties in the hopes of establishing a lasting peace for the Shoshone. = Gesegnet seist du, weiser und furchtloser Häuptling Pocatello, verehrter Anführer des Shoshonen-Volkes. Als junger Häuptling der Shoshonen stelltest du dich einer Welle vordringender amerikanischer Siedlungen im Westen der Vereinigten Staaten entgegen. Gezwungen, das angestammte Land der Shoshonen gegen einen scheinbar endlosen Strom neuer Einwanderer zu verteidigen, flößte deine Kriegerschar allen, die das heilige Land deines Volkes beanspruchen wollten, Furcht ein. Nach Jahren des Kampfes vermiedest du geschickt einen direkten Konflikt mit den Armeen der US-Regierung und handeltest eine Reihe von Verträgen aus, in der Hoffnung, einen dauerhaften Frieden für die Shoshonen zu sichern.
Most esteemed Pocatello, your people once again look to you for guidance. Will you conquer your enemies, driving them far from your lands? Or will you seek out peaceful diplomacy and trade? Will your new empire shine through the ages of history? = Hochverehrter Pocatello, dein Volk blickt erneut zu dir auf und bittet um Rat. Wirst du deine Feinde besiegen und sie aus deinem Land vertreiben? Oder wirst du friedliche Diplomatie und Handel anstreben? Wird deine Zivilisation die Jahrhunderte überdauern?
